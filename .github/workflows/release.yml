name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Build .app bundle
        run: make bundle

      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -r CodeWhisper.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "CodeWhisper" -srcfolder dmg_staging -ov -format UDZO CodeWhisper.dmg
          rm -rf dmg_staging

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" CodeWhisper.dmg \
            --repo ${{ github.repository }} \
            --title "CodeWhisper ${{ github.ref_name }}" \
            --notes "See CHANGELOG.md for details. Not code-signed/notarized: macOS Gatekeeper will show a warning on first run (right-click → Open)."
